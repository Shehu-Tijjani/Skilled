<!doctype html>
<html>
    <head>
        <meta http-equiv="content-type" content="text/html; charset=utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="style.css" />

        <title>Sign up</title>
    </head>
    <body>
        <h1 class="">Sign up</h1>
        <form action="" method="get" method="post">
            <div>
                <label for="firstname">First Name:</label>
                <input
                    type="text"
                    name="firstname"
                    id="firstname"
                    required=""
                />
            </div>

            <div>
                <label for="lastname">Last Name:</label>
                <input type="text" name="lastname" id="lastname" required="" />
            </div>

            <div>
                <label for="email">Email:</label>
                <input type="email" name="email" id="email" required />
            </div>

            <div class="gender-box">
                <p>Gender:</p>

                <input type="radio" name="gender" id="male" value="male" />
                <label for="male">Male</label>

                <input type="radio" name="gender" id="female" value="female" />
                <label for="female">Female</label>

                <input type="radio" name="gender" id="none" value="none" />
                <label for="none">Private</label>
            </div>

            <div class="country">
                <p>Select Country:</p>
                <select name="country" id="country">
                    <option value="Nigeria">Nigeria</option>
                    <option value="Algeria">Algeria</option>
                    <option value="Canada">Canada</option>
                    <option value="America">America</option>
                    <option value="Argentina">Argentina</option>
                    <option value="Ghana">Ghana</option>
                    <option value="Niger">Niger</option>
                    <option value="Abu Dhaabi">Abu Dhaabi</option>
                    <option value="Sudan">Sudan</option>
                    <option value="Sieria leone">Sieria leone</option>
                    <option value="Syria">Syria</option>
                    <option value="Pakistan">Pakistan</option>
                </select>
            </div>

            <div>
                <label for="password">Password:</label>
                <input
                    type="password"
                    name="password"
                    id="password"
                    maxlength="6"
                    minlength="6"
                    required
                />
            </div>

            <div>
                <label for="re-password">Confirm Password:</label>
                <input
                    type="password"
                    name="re-password"
                    id="re-password"
                    maxlength="6"
                    minlength="6"
                    required
                />
            </div>

            <a href="#" class="terms">Read Terms & Conditons</a>

            <div class="accpt-terms">
                <input type="checkbox" name="accpt-terms" id="accpt-terms" />
                <label for="accpt-terms">Accept terms and conditions</label>
            </div>

            <button type="submit">Continue</button>

            <p class="sign-in">
                Already have an account?
                <a href="../Form Login Page/index.html">Sign in</a>
            </p>
        </form>
    </body>
</html>
